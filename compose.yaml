services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "8080:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "zaq1@WSX"
    container_name: "rabbitmq"
    hostname: "rabbitmq"
    networks:
      - test-network
  nginx:
    build:
      context: ./reverse-proxy
      dockerfile: Dockerfile
    container_name: test-nginx
    restart: always
    ports:
      - "80:80"
    networks:
      - test-network
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
  example-web-server:
    container_name: test-web-server
    build:
      context: ./ExampleWebServer
      dockerfile: Dockerfile
    networks:
      - test-network
networks:
  test-network:
    name: test-network
    driver: bridge
    ipam:
      config:
          - subnet: 172.10.0.0/16
            gateway: 172.10.0.1

